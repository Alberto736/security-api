version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://user:password@mongo:27017/hermod
    depends_on:
      - mongo

  mongo:
    image: mongo:5.0.28-rc0-focal
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=hermod
    volumes:
      - ./mongodb/data:/data/db
