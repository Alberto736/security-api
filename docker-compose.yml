services:
  mongo:
    image: mongo:5.0.28
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=change_this_password_in_production
      - MONGO_INITDB_DATABASE=security_api
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - security-api-network

  api:
    build: 
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "3000:3000"
    restart: always
    environment:
      - MONGO_URI=mongodb://user:change_this_password_in_production@mongo:27017/security_api?authSource=security_api
      - API_KEY=${API_KEY:-}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-false}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JSON_LOGS=${JSON_LOGS:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-10}
      - REQUEST_DELAY_SECONDS=${REQUEST_DELAY_SECONDS:-0.35}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - security-api-network

volumes:
  mongo_data:
    driver: local

networks:
  security-api-network:
    driver: bridge
