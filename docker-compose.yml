version: '3.8'
services:
  api:
    build: 
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      # CORRECCIÓN: El usuario es 'user', no 'admin'
      # Y el authSource suele ser 'admin' (donde vive el root) o 'hermod'
      - MONGO_URI=mongodb://user:password@mongo:27017/hermod?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:5.0.28-rc0-focal
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=hermod
    volumes:
      - ./mongodb/data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
