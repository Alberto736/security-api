services:
  mongo:
    image: mongo:5.0.28
    ports:
      - "27017:27017"
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=hermod
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  api:
    build: 
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://user:password@mongo:27017/hermod?authSource=hermod
      - API_KEY=${API_KEY:-}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-false}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-10}
      - REQUEST_DELAY_SECONDS=${REQUEST_DELAY_SECONDS:-0.35}
    depends_on:
      - mongo

volumes:
  mongo_data:
