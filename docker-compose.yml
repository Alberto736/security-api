services:
  mongo:
    image: mongo:5.0.28
    ports:
      - "27017:27017"
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=hermod
    volumes:
      - ./mongodb/data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  api:
    build: 
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://user:password@mongo:27017/hermod?authSource=admin
    depends_on:
      - mongo
